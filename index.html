<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rundenzeiten – Joel vs Stefan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0e11;
  --bg-card:#15181d;
  --bg-card-hover:#1a1e24;
  --border:#262b33;
  --border-soft:#1d2127;
  --text:#e8eaed;
  --text-dim:#8a919c;
  --green:#27d18a;
  --green-bg:rgba(39,209,138,.12);
  --red:#e23d3d;
  --blue:#4da3ff;
  --mono:'JetBrains Mono',monospace;
  --display:'Chakra Petch',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ---------- Hintergrund: Streckenkurve mit Curbs ---------- */
.track-bg{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:.55;
}
.content{
  position:relative;
  z-index:1;
  max-width:880px;
  margin:0 auto;
  padding:48px 24px 96px;
}

/* ---------- Header ---------- */
header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:16px;
  margin-bottom:36px;
  flex-wrap:wrap;
}
.eyebrow{
  font-family:var(--display);
  font-size:12px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--text-dim);
  margin-bottom:6px;
}
h1{
  font-family:var(--display);
  font-size:clamp(26px,4vw,38px);
  font-weight:700;
  line-height:1.1;
  text-transform:uppercase;
  letter-spacing:.02em;
}
h1 .vs{color:var(--text-dim);font-weight:500;font-size:.6em;margin:0 .25em}
h1 .joel{color:var(--blue)}
h1 .stefan{color:var(--red)}

.btn-add{
  font-family:var(--display);
  font-size:13px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--bg);
  background:var(--green);
  border:none;
  border-radius:8px;
  padding:11px 18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  transition:transform .15s,box-shadow .15s;
}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(39,209,138,.35)}
.btn-add:active{transform:translateY(0)}

/* ---------- Stat-Karten ---------- */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:12px;
  margin-bottom:28px;
}
.stat{
  background:var(--bg-card);
  border:1px solid var(--border-soft);
  border-radius:12px;
  padding:16px 18px;
  position:relative;
  overflow:hidden;
}
.stat::before{
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background:var(--text-dim);
}
.stat.joel::before{background:var(--blue)}
.stat.stefan::before{background:var(--red)}
.stat.gap::before{background:var(--green)}
.stat .label{font-size:12px;color:var(--text-dim);margin-bottom:6px;letter-spacing:.04em}
.stat .value{font-family:var(--display);font-size:26px;font-weight:600}
.stat .value small{font-size:13px;color:var(--text-dim);font-family:var(--mono);font-weight:400}

/* ---------- Tabelle ---------- */
.table-card{
  background:var(--bg-card);
  border:1px solid var(--border-soft);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.35);
}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{
  font-family:var(--display);
  font-size:12px;
  font-weight:600;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--text-dim);
  text-align:right;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.02);
}
thead th:first-child{text-align:left;width:30%}
tbody td{
  padding:10px 18px;
  text-align:right;
  border-bottom:1px solid var(--border-soft);
  font-family:var(--mono);
  font-size:13.5px;
  white-space:nowrap;
}
tbody tr:last-child td{border-bottom:none}
tbody td:first-child{
  text-align:left;
  font-family:'Inter',sans-serif;
  font-weight:500;
  font-size:14px;
}
tbody tr{cursor:pointer;transition:background .12s}
tbody tr:hover{background:var(--bg-card-hover)}
tbody tr.selected{background:rgba(77,163,255,.07)}
tbody tr.selected td:first-child{color:var(--blue)}

.time-cell{display:inline-flex;align-items:center;gap:6px;justify-content:flex-end}
.time{
  padding:4px 9px;
  border-radius:7px;
}
.time.win{
  color:var(--green);
  background:var(--green-bg);
  font-weight:600;
}
.diff-cell{color:var(--text-dim);font-size:12.5px}

.edit-btn{
  background:none;
  border:none;
  cursor:pointer;
  padding:3px;
  border-radius:5px;
  color:var(--text-dim);
  opacity:0;
  transition:opacity .12s,color .12s;
  display:inline-flex;
}
tbody tr:hover .edit-btn{opacity:.7}
.edit-btn:hover{opacity:1!important;color:var(--text)}
.edit-input{
  width:92px;
  background:var(--bg);
  border:1px solid var(--green);
  border-radius:6px;
  color:var(--text);
  font-family:var(--mono);
  font-size:13px;
  padding:4px 7px;
  text-align:right;
  outline:none;
}

.diff-cell .diff-wrap{display:inline-flex;align-items:center;gap:6px;justify-content:flex-end}
.del-btn{
  background:none;
  border:none;
  cursor:pointer;
  padding:3px;
  border-radius:5px;
  color:var(--text-dim);
  opacity:0;
  transition:opacity .12s,color .12s;
  display:inline-flex;
}
tbody tr:hover .del-btn{opacity:.7}
.del-btn:hover{opacity:1!important;color:var(--red)}

/* ---------- Detail-Grafik ---------- */
.detail{
  margin-top:24px;
  background:var(--bg-card);
  border:1px solid var(--border-soft);
  border-radius:14px;
  padding:22px 24px;
  display:none;
  animation:slideUp .25s ease;
}
.detail.visible{display:block}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.detail h2{
  font-family:var(--display);
  font-size:17px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-bottom:4px;
}
.detail .sub{font-size:13px;color:var(--text-dim);margin-bottom:20px}
.detail .sub b{color:var(--green);font-family:var(--mono);font-weight:600}
.bar-row{display:grid;grid-template-columns:64px 1fr 90px;align-items:center;gap:14px;margin-bottom:12px}
.bar-row .name{font-family:var(--display);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.bar-row .name.joel{color:var(--blue)}
.bar-row .name.stefan{color:var(--red)}
.bar-track{height:26px;background:rgba(255,255,255,.04);border-radius:6px;overflow:hidden;position:relative}
.bar{
  height:100%;
  border-radius:6px;
  width:0;
  transition:width .5s cubic-bezier(.2,.8,.2,1);
  position:relative;
}
.bar.joel{background:linear-gradient(90deg,#2563b0,var(--blue))}
.bar.stefan{background:linear-gradient(90deg,#a32525,var(--red))}
.bar-row .t{font-family:var(--mono);font-size:13px;text-align:right}
.bar-row .t.win{color:var(--green);font-weight:600}
.detail .note{font-size:11.5px;color:var(--text-dim);margin-top:14px}

/* ---------- Modal: Strecke hinzufügen ---------- */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(3px);
  z-index:10;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.modal-bg.visible{display:flex}
.modal{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:28px;
  width:100%;
  max-width:400px;
  animation:slideUp .2s ease;
}
.modal h2{
  font-family:var(--display);
  font-size:18px;
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-bottom:20px;
}
.modal label{display:block;font-size:12.5px;color:var(--text-dim);margin:14px 0 6px}
.modal input{
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:var(--mono);
  font-size:14px;
  padding:10px 12px;
  outline:none;
  transition:border-color .15s;
}
.modal input:focus{border-color:var(--green)}
.modal input[name=track]{font-family:'Inter',sans-serif}
.modal .actions{display:flex;gap:10px;margin-top:24px;justify-content:flex-end}
.modal .actions button{
  font-family:var(--display);
  font-size:13px;
  font-weight:600;
  letter-spacing:.06em;
  text-transform:uppercase;
  border-radius:8px;
  padding:10px 18px;
  cursor:pointer;
  border:1px solid var(--border);
  background:none;
  color:var(--text-dim);
}
.modal .actions .save{background:var(--green);border-color:var(--green);color:var(--bg)}
.modal .hint{font-size:11.5px;color:var(--text-dim);margin-top:4px}
.modal .error{font-size:12px;color:var(--red);margin-top:10px;display:none}

@media (max-width:600px){
  thead th,tbody td{padding-left:10px;padding-right:10px}
  .edit-btn,.del-btn{opacity:.5}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<!-- Hintergrund: Streckenkurve mit Curbs -->
<svg class="track-bg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c0e11" stop-opacity="0"/>
      <stop offset="1" stop-color="#0c0e11" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <!-- Asphalt -->
  <path d="M -100 760 C 300 740, 520 700, 660 540 C 780 400, 760 240, 980 160 C 1160 95, 1360 110, 1560 60"
        fill="none" stroke="#171a1f" stroke-width="150" stroke-linecap="round"/>
  <!-- Curb aussen: rot -->
  <path d="M -100 760 C 300 740, 520 700, 660 540 C 780 400, 760 240, 980 160 C 1160 95, 1360 110, 1560 60"
        fill="none" stroke="#7a1f1f" stroke-width="170" stroke-linecap="round" stroke-dasharray="40 40" opacity=".45"/>
  <!-- Curb aussen: weiss -->
  <path d="M -100 760 C 300 740, 520 700, 660 540 C 780 400, 760 240, 980 160 C 1160 95, 1360 110, 1560 60"
        fill="none" stroke="#6e7077" stroke-width="170" stroke-linecap="round" stroke-dasharray="40 40" stroke-dashoffset="40" opacity=".35"/>
  <!-- Asphalt oben drauf -->
  <path d="M -100 760 C 300 740, 520 700, 660 540 C 780 400, 760 240, 980 160 C 1160 95, 1360 110, 1560 60"
        fill="none" stroke="#15181d" stroke-width="138" stroke-linecap="round"/>
  <!-- Mittellinie -->
  <path d="M -100 760 C 300 740, 520 700, 660 540 C 780 400, 760 240, 980 160 C 1160 95, 1360 110, 1560 60"
        fill="none" stroke="#3a3f48" stroke-width="3" stroke-dasharray="26 30" opacity=".5"/>
  <rect x="0" y="450" width="1440" height="450" fill="url(#fade)"/>
</svg>

<div class="content">
  <header>
    <div>
      <p class="eyebrow">ACC · Hotlap-Vergleich</p>
      <h1><span class="joel">Joel</span><span class="vs">vs</span><span class="stefan">Stefan</span></h1>
    </div>
    <button class="btn-add" id="addBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Strecke hinzufügen
    </button>
  </header>

  <div class="stats" id="stats"></div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Strecke</th>
          <th>Joel</th>
          <th>Stefan</th>
          <th>Differenz</th>
        </tr>
      </thead>
      <tbody id="laps"></tbody>
    </table>
  </div>

  <div class="detail" id="detail">
    <h2 id="detailTitle"></h2>
    <p class="sub" id="detailSub"></p>
    <div class="bar-row">
      <span class="name joel">Joel</span>
      <div class="bar-track"><div class="bar joel" id="barJoel"></div></div>
      <span class="t" id="tJoel"></span>
    </div>
    <div class="bar-row">
      <span class="name stefan">Stefan</span>
      <div class="bar-track"><div class="bar stefan" id="barStefan"></div></div>
      <span class="t" id="tStefan"></span>
    </div>
    <p class="note">Balken sind auf die Differenz skaliert, damit der Abstand sichtbar wird.</p>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>Neue Strecke</h2>
    <label>Strecke</label>
    <input name="track" id="inTrack" placeholder="z. B. Imola">
    <label>Zeit Joel</label>
    <input id="inJoel" placeholder="1:43.250">
    <label>Zeit Stefan</label>
    <input id="inStefan" placeholder="1:43.512">
    <p class="hint">Format: m:ss.mmm</p>
    <p class="error" id="modalError">Bitte gültige Zeiten im Format m:ss.mmm eingeben.</p>
    <div class="actions">
      <button id="cancelBtn">Abbrechen</button>
      <button class="save" id="saveBtn">Hinzufügen</button>
    </div>
  </div>
</div>

<script>
let data = [
["Barcelona","1:48.680","1:48.802"],
["Brands Hatch","1:27.707","1:28.380"],
["Hungaroring","1:49.990","1:51.250"],
["Misano","1:38.650","1:38.512"],
["Monza","1:52.262","1:51.852"],
["Nürburgring","1:58.810","1:59.017"],
["Paul Ricard","1:59.570","2:00.865"],
["Silverstone","2:05.860","2:07.842"],
["Spa-Francorchamps","2:22.142","2:24.057"],
["Valencia","1:36.155","1:39.425"],
["Zandvoort","1:42.845","1:43.117"],
["Zolder","1:34.027","1:34.900"],
["24H Nürburgring","8:38.675","8:28.183"],
["Mount Panorama","2:06.660","2:05.607"],
["Laguna Seca","1:26.335","1:25.802"],
["Suzuka","2:07.587","2:08.167"],
["Kalami","1:48.157","1:49.217"]
];

let selected = -1;

const TIME_RE = /^(\d+):([0-5]\d\.\d{1,3})$/;
function toSec(t){ const p = t.split(":"); return parseInt(p[0])*60 + parseFloat(p[1]); }
function fmtDiff(d){ return d.toFixed(3).replace(".",",") + " s"; }

const tb = document.getElementById("laps");
const statsEl = document.getElementById("stats");

const pencilSVG = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>';
const trashSVG = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M10 11v6M14 11v6"/></svg>';

function render(){
  // Stats
  let joelWins = 0, stefanWins = 0, maxGap = 0, maxTrack = "–";
  data.forEach(r=>{
    const j = toSec(r[1]), s = toSec(r[2]);
    if(j < s) joelWins++; else if(s < j) stefanWins++;
    const d = Math.abs(j - s);
    if(d > maxGap){ maxGap = d; maxTrack = r[0]; }
  });
  statsEl.innerHTML = `
    <div class="stat joel"><p class="label">Schnellere Strecken – Joel</p><p class="value">${joelWins}</p></div>
    <div class="stat stefan"><p class="label">Schnellere Strecken – Stefan</p><p class="value">${stefanWins}</p></div>
    <div class="stat gap"><p class="label">Grösster Abstand</p><p class="value">${maxTrack} <small>${fmtDiff(maxGap)}</small></p></div>`;

  // Tabelle
  tb.innerHTML = "";
  data.forEach((r, i)=>{
    const j = toSec(r[1]), s = toSec(r[2]);
    const joelWins = j < s;
    const tr = document.createElement("tr");
    if(i === selected) tr.classList.add("selected");
    tr.innerHTML = `
      <td>${r[0]}</td>
      <td><span class="time-cell"><span class="time ${joelWins?"win":""}">${r[1]}</span><button class="edit-btn" data-i="${i}" data-c="1" title="Zeit bearbeiten">${pencilSVG}</button></span></td>
      <td><span class="time-cell"><span class="time ${!joelWins?"win":""}">${r[2]}</span><button class="edit-btn" data-i="${i}" data-c="2" title="Zeit bearbeiten">${pencilSVG}</button></span></td>
      <td class="diff-cell"><span class="diff-wrap">${fmtDiff(Math.abs(j-s))}<button class="del-btn" data-i="${i}" title="Strecke löschen">${trashSVG}</button></span></td>`;
    tr.addEventListener("click", e=>{
      if(e.target.closest(".edit-btn") || e.target.closest(".edit-input") || e.target.closest(".del-btn")) return;
      selectRow(i);
    });
    tb.appendChild(tr);
  });

  tb.querySelectorAll(".edit-btn").forEach(btn=>{
    btn.addEventListener("click", e=>{
      e.stopPropagation();
      startEdit(parseInt(btn.dataset.i), parseInt(btn.dataset.c), btn);
    });
  });

  tb.querySelectorAll(".del-btn").forEach(btn=>{
    btn.addEventListener("click", e=>{
      e.stopPropagation();
      deleteRow(parseInt(btn.dataset.i));
    });
  });

  if(selected >= 0) showDetail(selected);
}

function deleteRow(i){
  if(!confirm(`Strecke "${data[i][0]}" wirklich löschen?`)) return;
  data.splice(i, 1);
  // Auswahl/Detailansicht an den geänderten Index anpassen
  if(selected === i) selected = -1;
  else if(selected > i) selected--;
  document.getElementById("detail").classList.toggle("visible", selected >= 0);
  render();
}

function startEdit(i, col, btn){
  const cell = btn.closest(".time-cell");
  const old = data[i][col];
  cell.innerHTML = `<input class="edit-input" value="${old}">`;
  const input = cell.querySelector("input");
  input.focus();
  input.select();
  const save = ()=>{
    const v = input.value.trim();
    if(TIME_RE.test(v)) data[i][col] = v;
    render();
  };
  input.addEventListener("keydown", e=>{
    if(e.key === "Enter") save();
    if(e.key === "Escape") render();
  });
  input.addEventListener("blur", save);
  input.addEventListener("click", e=>e.stopPropagation());
}

function selectRow(i){
  selected = (selected === i) ? -1 : i;
  render();
  if(selected >= 0){
    document.getElementById("detail").scrollIntoView({behavior:"smooth", block:"nearest"});
  }
}

function showDetail(i){
  const detail = document.getElementById("detail");
  const r = data[i];
  const j = toSec(r[1]), s = toSec(r[2]);
  const diff = Math.abs(j - s);
  const winner = j < s ? "Joel" : (s < j ? "Stefan" : "Niemand");
  const pct = ((diff / Math.min(j,s)) * 100).toFixed(2).replace(".",",");

  document.getElementById("detailTitle").textContent = r[0];
  document.getElementById("detailSub").innerHTML =
    winner === "Niemand"
      ? "Exakt gleiche Zeit."
      : `${winner} ist <b>${fmtDiff(diff)}</b> schneller (${pct} % pro Runde).`;

  const tJ = document.getElementById("tJoel");
  const tS = document.getElementById("tStefan");
  tJ.textContent = r[1]; tS.textContent = r[2];
  tJ.classList.toggle("win", j < s);
  tS.classList.toggle("win", s < j);

  // Skala: schnellste Zeit minus ein kleiner Puffer als Nullpunkt,
  // damit die Differenz sichtbar wird
  const base = Math.min(j, s) - Math.max(diff * 1.2, 0.4);
  const range = Math.max(j, s) - base;
  const wJ = ((j - base) / range) * 100;
  const wS = ((s - base) / range) * 100;

  detail.classList.add("visible");
  requestAnimationFrame(()=>{
    document.getElementById("barJoel").style.width = wJ + "%";
    document.getElementById("barStefan").style.width = wS + "%";
  });
}

// ---------- Modal ----------
const modalBg = document.getElementById("modalBg");
const modalError = document.getElementById("modalError");

document.getElementById("addBtn").addEventListener("click", ()=>{
  document.getElementById("inTrack").value = "";
  document.getElementById("inJoel").value = "";
  document.getElementById("inStefan").value = "";
  modalError.style.display = "none";
  modalBg.classList.add("visible");
  document.getElementById("inTrack").focus();
});
document.getElementById("cancelBtn").addEventListener("click", ()=> modalBg.classList.remove("visible"));
modalBg.addEventListener("click", e=>{ if(e.target === modalBg) modalBg.classList.remove("visible"); });

document.getElementById("saveBtn").addEventListener("click", ()=>{
  const track = document.getElementById("inTrack").value.trim();
  const tj = document.getElementById("inJoel").value.trim();
  const ts = document.getElementById("inStefan").value.trim();
  if(!track || !TIME_RE.test(tj) || !TIME_RE.test(ts)){
    modalError.style.display = "block";
    return;
  }
  data.push([track, tj, ts]);
  modalBg.classList.remove("visible");
  selected = data.length - 1;
  render();
});
document.addEventListener("keydown", e=>{
  if(e.key === "Escape") modalBg.classList.remove("visible");
});

render();
