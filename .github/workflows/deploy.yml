name: Deploy to GitHub Pages

on:
  # Bei jedem Push auf main automatisch deployen
  push:
    branches: [main]
  # Erlaubt auch manuelles Auslösen über den Actions-Tab
  workflow_dispatch:

# Berechtigungen, die GitHub Pages benötigt
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deployment gleichzeitig; laufende werden nicht abgebrochen
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Aktiviert GitHub Pages automatisch (Quelle = GitHub Actions),
          # falls es im Repo noch nicht eingerichtet ist
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Gesamtes Repository-Root als statische Seite hochladen
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
